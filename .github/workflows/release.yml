name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  id-token: write
  attestations: write

jobs:
  build:
    uses: ./.github/workflows/build-core.yml
    with:
      run_tests: false
      build_macos_arm64: true
      build_macos_amd64: true
      build_windows_amd64: false
      build_linux_amd64: false
      require_macos_notarize: false
      require_windows_signpath: false
      artifact_retention_days: 10
    secrets: inherit

  release:
    name: Create Release
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHANGELOG=$(awk -v version="$VERSION" '
            index($0, "## v" version " ") == 1 {
              in_changelog = 1
              next
            }
            in_changelog && /^## v[0-9]/ {
              exit
            }
            in_changelog && $0 == "---" {
              exit
            }
            in_changelog {
              print
            }
          ' CHANGELOG.md)
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Compute checksums (MD5)
        id: checksums
        run: |
          set -euo pipefail
          MAC_ARM64_MD5="$(md5 -q release-files/wox-mac-arm64.dmg 2>/dev/null || md5sum release-files/wox-mac-arm64.dmg | awk '{print $1}')"
          MAC_AMD64_MD5="$(md5 -q release-files/wox-mac-amd64.dmg 2>/dev/null || md5sum release-files/wox-mac-amd64.dmg | awk '{print $1}')"
          echo "MAC_ARM64_MD5=$MAC_ARM64_MD5" >> "$GITHUB_OUTPUT"
          echo "MAC_AMD64_MD5=$MAC_AMD64_MD5" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release-files/*"
          tag: ${{ github.ref_name }}
          name: "Wox ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout master to update updater.json
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
          path: repo

      - name: Refresh update-channel manifests in master
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG: ${{ github.ref_name }}
          MAC_ARM64_MD5: ${{ steps.checksums.outputs.MAC_ARM64_MD5 }}
          MAC_AMD64_MD5: ${{ steps.checksums.outputs.MAC_AMD64_MD5 }}
        run: |
          set -euo pipefail

          cd repo

          MAC_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/wox-mac-arm64.dmg"
          MAC_AMD64_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/wox-mac-amd64.dmg"

          cat > release-notes.txt <<'EOF'
          ${{ steps.changelog.outputs.CHANGELOG }}
          EOF

          if [[ "$VERSION" == *-* ]]; then
            manifests=(updater.beta.json)
          else
            manifests=(updater.json updater.beta.json)
          fi

          for manifest in "${manifests[@]}"; do
            if [ ! -f "$manifest" ]; then
              cp updater.json "$manifest"
            fi

            tmp="$(mktemp)"
            jq \
              --arg version "$VERSION" \
              --arg macUrl "$MAC_URL" \
              --arg macMd5 "$MAC_ARM64_MD5" \
              --arg macAmd64Url "$MAC_AMD64_URL" \
              --arg macAmd64Md5 "$MAC_AMD64_MD5" \
              --rawfile notes release-notes.txt \
              '.Version = $version
              | .MacArm64DownloadUrl = $macUrl
              | .MacArm64Checksum = $macMd5
              | .MacAmd64DownloadUrl = $macAmd64Url
              | .MacAmd64Checksum = $macAmd64Md5
              | .ReleaseNotes = ($notes | rtrimstr("\n"))' \
              "$manifest" > "$tmp"
            mv "$tmp" "$manifest"
          done

          if git diff --quiet -- updater.json updater.beta.json; then
            echo "update-channel manifests unchanged; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updater.json updater.beta.json
          git commit -m "chore: update release manifests for ${TAG}"
          git push origin master
