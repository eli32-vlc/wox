name: Reusable Build

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run test job"
        type: boolean
        required: false
        default: false
      build_macos_arm64:
        description: "Build macOS ARM64"
        type: boolean
        required: false
        default: true
      build_macos_amd64:
        description: "Build macOS AMD64"
        type: boolean
        required: false
        default: true
      build_windows_amd64:
        description: "Build Windows AMD64"
        type: boolean
        required: false
        default: false
      build_linux_amd64:
        description: "Build Linux AMD64"
        type: boolean
        required: false
        default: false
      require_macos_notarize:
        description: "Require macOS signing + notarization"
        type: boolean
        required: false
        default: false
      require_windows_signpath:
        description: "Require Windows SignPath signing"
        type: boolean
        required: false
        default: false
      artifact_retention_days:
        description: "Artifacts retention days"
        type: number
        required: false
        default: 10
  workflow_call:
    inputs:
      run_tests:
        type: boolean
        required: false
        default: false
      build_macos_arm64:
        type: boolean
        required: false
        default: true
      build_macos_amd64:
        type: boolean
        required: false
        default: true
      build_windows_amd64:
        type: boolean
        required: false
        default: false
      build_linux_amd64:
        type: boolean
        required: false
        default: false
      require_macos_notarize:
        type: boolean
        required: false
        default: false
      require_windows_signpath:
        type: boolean
        required: false
        default: false
      artifact_retention_days:
        type: number
        required: false
        default: 10
    secrets:
      MACOS_KEYCHAINPWD:
        required: false
      MACOS_SIGN_P12_BASE64:
        required: false
      MACOS_SIGN_P12_PASSWORD:
        required: false
      MACOS_SIGN_IDENTITY:
        required: false
      APPLE_API_KEY_ID:
        required: false
      APPLE_API_ISSUER_ID:
        required: false
      APPLE_API_PRIVATE_KEY_P8_BASE64:
        required: false
      SIGNPATH_API_TOKEN:
        required: false
      SIGNPATH_ORGANIZATION_ID:
        required: false

permissions:
  contents: read
  actions: write
  id-token: write
  attestations: write

jobs:
  build_macos_arm64:
    name: Build macOS ARM64
    if: ${{ inputs.build_macos_arm64 }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: wox.core/go.mod
          cache: true
          cache-dependency-path: wox.core/go.sum
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            wox.plugin.host.nodejs/pnpm-lock.yaml
            wox.plugin.nodejs/pnpm-lock.yaml
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install create-dmg
        run: brew install create-dmg
      - name: Enable Flutter desktop (macOS)
        run: flutter config --enable-macos-desktop

      - name: Build
        run: make build
        env:
          MACOS_KEYCHAINPWD: ${{ inputs.require_macos_notarize && secrets.MACOS_KEYCHAINPWD || '' }}
          MACOS_SIGN_IDENTITY: ${{ inputs.require_macos_notarize && secrets.MACOS_SIGN_IDENTITY || '' }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ./release/wox-mac-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wox-mac-arm64.dmg
          path: ./release/wox-mac-arm64.dmg
          retention-days: ${{ inputs.artifact_retention_days }}

  build_macos_amd64:
    name: Build macOS AMD64
    if: ${{ inputs.build_macos_amd64 }}
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: wox.core/go.mod
          cache: true
          cache-dependency-path: wox.core/go.sum
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            wox.plugin.host.nodejs/pnpm-lock.yaml
            wox.plugin.nodejs/pnpm-lock.yaml
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install create-dmg
        run: brew install create-dmg
      - name: Enable Flutter desktop (macOS)
        run: flutter config --enable-macos-desktop

      - name: Build
        run: make build
        env:
          MACOS_KEYCHAINPWD: ${{ inputs.require_macos_notarize && secrets.MACOS_KEYCHAINPWD || '' }}
          MACOS_SIGN_IDENTITY: ${{ inputs.require_macos_notarize && secrets.MACOS_SIGN_IDENTITY || '' }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ./release/wox-mac-amd64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wox-mac-amd64.dmg
          path: ./release/wox-mac-amd64.dmg
          retention-days: ${{ inputs.artifact_retention_days }}
